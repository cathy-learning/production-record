version: '3.9'

services:
  backend:
    build:
      context: ./app/backend
    container_name: production-record-backend
    environment:
      PORT: 3001
      DATABASE_FILE: /data/production.db
    volumes:
      - ./data:/data
    ports:
      - '3001:3001'
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
    container_name: production-record-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    ports:
      - '3000:3000'
    restart: unless-stopped
